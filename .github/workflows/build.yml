name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write          # needed to attach binaries to a Release on tags

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS
          - os: windows-latest
            label: Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-gui.txt

      - name: Core selftest
        run: python selftest.py

      - name: Build app
        run: pyinstaller --noconfirm MA2TimecodeCut.spec

      - name: Package macOS (.dmg)
        if: runner.os == 'macOS'
        run: |
          cd dist
          hdiutil create -volname "MA2 Timecode Cut" \
            -srcfolder "MA2 Timecode Cut.app" -ov -format UDZO \
            "MA2-Timecode-Cut-macOS.dmg"

      - name: Package Windows (.zip)
        if: runner.os == 'Windows'
        run: |
          cd dist
          Compress-Archive -Path "MA2 Timecode Cut" -DestinationPath "MA2-Timecode-Cut-Windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MA2-Timecode-Cut-${{ matrix.label }}
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
